# Vonk — Nginx reverse proxy config
# Copy to /etc/nginx/sites-available/vonk.conf and symlink to sites-enabled

server {
    listen 80;
    server_name vonk.social;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vonk.social;

    ssl_certificate     /etc/letsencrypt/live/vonk.social/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vonk.social/privkey.pem;
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # SvelteKit frontend
    location / {
        proxy_pass http://127.0.0.1:3400;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:3401;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rate limiting
        limit_req zone=api burst=20 nodelay;
    }

    # WebSocket (notifications, DMs)
    location /ws {
        proxy_pass http://127.0.0.1:3401;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Media (from MinIO)
    location /media/ {
        proxy_pass http://127.0.0.1:9000/vonk-media/;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-meta-server-side-encryption;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Upload size limit
    client_max_body_size 100M;
}
