# Vonk — Nginx reverse proxy config
#
# Phase 1 staging target: dev.vonk.social on 76.13.46.169.
# Copy to /etc/nginx/sites-available/vonk.conf and symlink to sites-enabled.
#
# Ports are allocated uniquely on the shared host to avoid collisions with
# existing services (burgemeestershof on :3850, etc.):
#   3400  → SvelteKit (adapter-node: `node build/index.js`)
#   3401  → Rust API (vonk-api)
#   9000  → MinIO (internal only)
#
# Before reloading: certbot --nginx -d dev.vonk.social

# ── Rate limiting zones (declared once at http{} level) ──────
# If you already define these elsewhere, drop the two lines.
# Otherwise put them in /etc/nginx/conf.d/ratelimit.conf.
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

server {
    listen 80;
    server_name vonk.social dev.vonk.social;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dev.vonk.social;

    ssl_certificate     /etc/letsencrypt/live/dev.vonk.social/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.vonk.social/privkey.pem;
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers off;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # SvelteKit frontend
    location / {
        proxy_pass http://127.0.0.1:3400;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API
    location /api/ {
        proxy_pass http://127.0.0.1:3401;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Auth endpoints have stricter per-IP limits enforced in-app;
        # the zone here is a belt-and-braces layer. Uncomment once the
        # http-level zone above is in place.
        # limit_req zone=api burst=20 nodelay;
    }

    # WebSocket (Phase 2: notifications, DMs)
    location /ws {
        proxy_pass http://127.0.0.1:3401;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400;
    }

    # Media (from MinIO)
    # The S3 bucket layout is `/vonk-media/<key>`, so we rewrite the public
    # `/media/<key>` path into `/vonk-media/<key>` at the upstream.
    location /media/ {
        proxy_pass http://127.0.0.1:9000/vonk-media/;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-meta-server-side-encryption;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Upload size limit — must exceed the API's avatar limit (5 MiB).
    client_max_body_size 16M;
}
