# Vonk — Nginx reverse proxy config (production template)
#
# Copy to /etc/nginx/sites-available/vonk-social.conf on the host,
# symlink into sites-enabled, run `certbot --nginx -d vonk.social -d www.vonk.social`,
# then `systemctl reload nginx`.
#
# This config assumes:
#   - Rust API on 127.0.0.1:3501
#   - SvelteKit adapter-node on 127.0.0.1:3500
#   - MinIO (S3 API) on 127.0.0.1:9100, bucket name `vonk-media`
# Forwards X-Forwarded-Host + X-Forwarded-Proto so the API can build
# OAuth redirect URIs that match the incoming host.

server {
    listen 80;
    server_name vonk.social www.vonk.social;
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

# www → apex (canonical)
server {
    listen 443 ssl http2;
    server_name www.vonk.social;
    ssl_certificate     /etc/letsencrypt/live/vonk.social/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vonk.social/privkey.pem;
    return 301 https://vonk.social$request_uri;
}

server {
    listen 443 ssl http2;
    server_name vonk.social;

    ssl_certificate     /etc/letsencrypt/live/vonk.social/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vonk.social/privkey.pem;
    ssl_protocols       TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

    client_max_body_size 16M;

    location /api/ {
        proxy_pass http://127.0.0.1:3501;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }

    location /media/ {
        proxy_pass http://127.0.0.1:9100/vonk-media/;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-meta-server-side-encryption;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header X-Content-Type-Options "nosniff" always;
    }

    location / {
        proxy_pass http://127.0.0.1:3500;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}
