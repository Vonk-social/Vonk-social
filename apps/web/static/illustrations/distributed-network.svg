<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 300" role="img" aria-label="Distributed network illustration showing data replicated across multiple nodes">
  <defs>
    <style>
      .node-fill { fill: rgba(255, 255, 255, 0.15); stroke: rgba(255, 255, 255, 0.6); stroke-width: 1.5; }
      .node-down { fill: rgba(255, 255, 255, 0.06); stroke: rgba(255, 255, 255, 0.25); stroke-width: 1.5; stroke-dasharray: 6 4; }
      .line { stroke: rgba(255, 255, 255, 0.3); stroke-width: 1.5; fill: none; }
      .line-active { stroke: rgba(255, 255, 255, 0.5); stroke-width: 1.5; fill: none; }
      .icon { fill: rgba(255, 255, 255, 0.85); }
      .icon-dim { fill: rgba(255, 255, 255, 0.25); }
      .check { fill: #7A9E7E; }
      .cross { stroke: rgba(255, 255, 255, 0.35); stroke-width: 2; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Connection lines between nodes -->
  <!-- Node1 to Node2 -->
  <line x1="175" y1="110" x2="425" y2="90" class="line-active"/>
  <!-- Node1 to Node3 -->
  <line x1="150" y1="140" x2="280" y2="230" class="line-active"/>
  <!-- Node2 to Node3 -->
  <line x1="410" y1="120" x2="310" y2="225" class="line-active"/>
  <!-- Node1 to Node4 (down) -->
  <line x1="175" y1="120" x2="460" y2="220" class="line" stroke-dasharray="4 6"/>
  <!-- Node2 to Node4 (down) -->
  <line x1="445" y1="115" x2="490" y2="205" class="line" stroke-dasharray="4 6"/>

  <!-- Lock icons on active connections -->
  <!-- Lock on line Node1-Node2 -->
  <g transform="translate(290, 92)">
    <rect x="-5" y="-2" width="10" height="8" rx="1.5" fill="rgba(255,255,255,0.7)"/>
    <path d="M-3,-2 L-3,-5 A3,3 0 0,1 3,-5 L3,-2" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Lock on line Node1-Node3 -->
  <g transform="translate(205, 178)">
    <rect x="-5" y="-2" width="10" height="8" rx="1.5" fill="rgba(255,255,255,0.7)"/>
    <path d="M-3,-2 L-3,-5 A3,3 0 0,1 3,-5 L3,-2" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Lock on line Node2-Node3 -->
  <g transform="translate(368, 168)">
    <rect x="-5" y="-2" width="10" height="8" rx="1.5" fill="rgba(255,255,255,0.7)"/>
    <path d="M-3,-2 L-3,-5 A3,3 0 0,1 3,-5 L3,-2" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- NODE 1 (top-left, healthy) -->
  <g transform="translate(100, 70)">
    <rect x="0" y="0" width="90" height="80" rx="16" class="node-fill"/>
    <!-- User icon 1 -->
    <circle cx="30" cy="30" r="6" class="icon"/>
    <path d="M22,44 A8,6 0 0,1 38,44" class="icon" fill="rgba(255,255,255,0.65)"/>
    <!-- User icon 2 -->
    <circle cx="60" cy="30" r="6" class="icon"/>
    <path d="M52,44 A8,6 0 0,1 68,44" class="icon" fill="rgba(255,255,255,0.65)"/>
    <!-- Data blocks -->
    <rect x="18" y="54" width="18" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="40" y="54" width="12" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="56" y="54" width="16" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="18" y="62" width="10" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="32" y="62" width="20" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
    <!-- Checkmark -->
    <g transform="translate(75, 10)">
      <circle cx="0" cy="0" r="8" class="check" opacity="0.9"/>
      <path d="M-4,0 L-1,3 L4,-3" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- NODE 2 (top-right, healthy) -->
  <g transform="translate(410, 50)">
    <rect x="0" y="0" width="90" height="80" rx="16" class="node-fill"/>
    <!-- User icon 1 -->
    <circle cx="30" cy="30" r="6" class="icon"/>
    <path d="M22,44 A8,6 0 0,1 38,44" class="icon" fill="rgba(255,255,255,0.65)"/>
    <!-- User icon 2 -->
    <circle cx="60" cy="30" r="6" class="icon"/>
    <path d="M52,44 A8,6 0 0,1 68,44" class="icon" fill="rgba(255,255,255,0.65)"/>
    <!-- Data blocks -->
    <rect x="18" y="54" width="14" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="36" y="54" width="18" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="58" y="54" width="14" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="18" y="62" width="22" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="44" y="62" width="10" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
    <!-- Checkmark -->
    <g transform="translate(75, 10)">
      <circle cx="0" cy="0" r="8" class="check" opacity="0.9"/>
      <path d="M-4,0 L-1,3 L4,-3" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- NODE 3 (bottom-center, healthy) -->
  <g transform="translate(245, 210)">
    <rect x="0" y="0" width="90" height="80" rx="16" class="node-fill"/>
    <!-- User icon 1 -->
    <circle cx="30" cy="30" r="6" class="icon"/>
    <path d="M22,44 A8,6 0 0,1 38,44" class="icon" fill="rgba(255,255,255,0.65)"/>
    <!-- User icon 2 -->
    <circle cx="60" cy="30" r="6" class="icon"/>
    <path d="M52,44 A8,6 0 0,1 68,44" class="icon" fill="rgba(255,255,255,0.65)"/>
    <!-- Data blocks -->
    <rect x="18" y="54" width="16" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="38" y="54" width="12" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="54" y="54" width="18" height="4" rx="2" fill="rgba(255,255,255,0.4)"/>
    <rect x="18" y="62" width="12" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
    <rect x="34" y="62" width="18" height="4" rx="2" fill="rgba(255,255,255,0.3)"/>
    <!-- Checkmark -->
    <g transform="translate(75, 10)">
      <circle cx="0" cy="0" r="8" class="check" opacity="0.9"/>
      <path d="M-4,0 L-1,3 L4,-3" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- NODE 4 (right, DOWN) -->
  <g transform="translate(460, 195)">
    <rect x="0" y="0" width="90" height="80" rx="16" class="node-down"/>
    <!-- Dimmed user icon -->
    <circle cx="30" cy="30" r="6" class="icon-dim"/>
    <path d="M22,44 A8,6 0 0,1 38,44" fill="rgba(255,255,255,0.15)"/>
    <!-- Dimmed user icon 2 -->
    <circle cx="60" cy="30" r="6" class="icon-dim"/>
    <path d="M52,44 A8,6 0 0,1 68,44" fill="rgba(255,255,255,0.15)"/>
    <!-- Dimmed data blocks -->
    <rect x="18" y="54" width="18" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
    <rect x="40" y="54" width="14" height="4" rx="2" fill="rgba(255,255,255,0.12)"/>
    <rect x="18" y="62" width="10" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <rect x="32" y="62" width="16" height="4" rx="2" fill="rgba(255,255,255,0.1)"/>
    <!-- Crack / X mark -->
    <g transform="translate(75, 10)">
      <circle cx="0" cy="0" r="8" fill="rgba(255,255,255,0.15)"/>
      <line x1="-3.5" y1="-3.5" x2="3.5" y2="3.5" class="cross"/>
      <line x1="3.5" y1="-3.5" x2="-3.5" y2="3.5" class="cross"/>
    </g>
    <!-- Subtle crack lines on the node -->
    <path d="M50,0 L46,12 L52,20" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1" stroke-linecap="round"/>
  </g>

  <!-- Small flowing dots on active connections to show data movement -->
  <!-- Dot on Node1-Node2 line -->
  <circle cx="230" cy="102" r="2.5" fill="rgba(255,255,255,0.6)">
    <animate attributeName="cx" values="180;420" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="110;92" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="350" cy="96" r="2.5" fill="rgba(255,255,255,0.6)">
    <animate attributeName="cx" values="420;180" dur="3.5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="92;110" dur="3.5s" repeatCount="indefinite"/>
  </circle>

  <!-- Dot on Node1-Node3 line -->
  <circle cx="200" cy="170" r="2.5" fill="rgba(255,255,255,0.6)">
    <animate attributeName="cx" values="155;275" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="140;228" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Dot on Node2-Node3 line -->
  <circle cx="370" cy="165" r="2.5" fill="rgba(255,255,255,0.6)">
    <animate attributeName="cx" values="405;315" dur="3.2s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="122;227" dur="3.2s" repeatCount="indefinite"/>
  </circle>
</svg>
