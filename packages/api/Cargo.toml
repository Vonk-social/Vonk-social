[package]
name = "vonk-api"
version = "0.1.0"
edition = "2021"
description = "Vonk social platform — API server"
license = "AGPL-3.0-or-later"
repository = "https://github.com/Vonk-social/Vonk-social"

[dependencies]
# Web framework
axum = { version = "0.8", features = ["ws", "multipart", "macros"] }
axum-extra = { version = "0.10", features = ["cookie", "typed-header"] }
tokio = { version = "1", features = ["full"] }
tower = "0.5"
tower-http = { version = "0.6", features = ["cors", "trace", "compression-gzip", "limit"] }

# Database
sqlx = { version = "0.8", features = ["runtime-tokio", "tls-rustls", "postgres", "uuid", "chrono", "json", "macros"] }

# Cache / Valkey
redis = { version = "0.27", features = ["tokio-comp", "connection-manager"] }

# Auth
jsonwebtoken = "9"
argon2 = "0.5"
urlencoding = "2"

# HTTP client (Google userinfo, etc.)
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }

# Serialization
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Media processing
image = { version = "0.25", default-features = false, features = ["jpeg", "png", "webp"] }
webp = "0.3"

# S3/MinIO
aws-sdk-s3 = { version = "1", features = ["behavior-version-latest"] }
aws-config = { version = "1", features = ["behavior-version-latest"] }
aws-credential-types = "1"

# Email (Postal SMTP via lettre)
lettre = { version = "0.11", default-features = false, features = ["smtp-transport", "tokio1-rustls-tls", "builder", "hostname"] }

# Web Push (VAPID + payload encryption)
web-push = "0.10"

# Utilities
uuid = { version = "1", features = ["v4", "serde"] }
chrono = { version = "0.4", features = ["serde"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter", "json"] }
dotenvy = "0.15"
thiserror = "2"
anyhow = "1"
validator = { version = "0.19", features = ["derive"] }
time = "0.3"
rand = "0.8"
base64 = "0.22"
hex = "0.4"
sha2 = "0.10"
regex = "1"
once_cell = "1"

[dev-dependencies]
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls", "cookies"] }
tokio = { version = "1", features = ["full", "test-util"] }
